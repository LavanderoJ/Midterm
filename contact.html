<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">

</head>

<body>
  <div id="leaves-container"></div>

  <nav class="sidebar container-fluid">
    <h2 class="logo">My Portfolio</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Me</a></li>
      <li><a href="experience.html">Experience</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main class="content container-fluid">
    <h1 class="text-center bg-success bg-gradient text-white p-3 shadow-sm rounded-bottom">
      Contact Me
    </h1>

    <section class="container my-5">

      <div class="card shadow-lg border-0 mb-4">
        <div class="card-header bg-success text-white fw-semibold">
          Contact Information
        </div>

        <ul class="list-group list-group-flush">
          <li class="list-group-item d-flex justify-content-between">
            <span class="fw-semibold">Phone:</span>
            <span>+63 09936429652</span>
          </li>
          <li class="list-group-item d-flex justify-content-between">
            <span class="fw-semibold">Email:</span>
            <span>lavandero.justine14@gmail.com</span>
          </li>
          <li class="list-group-item d-flex justify-content-between">
            <span class="fw-semibold">Messenger:</span>
            <a href="https://www.facebook.com/JustLav1/">
              <span>Justine Lavandero</span>
            </a>
          </li>
        </ul>
      </div>

      <form action="https://formspree.io/f/mlganrzo" method="POST">
        <div class="mb-3">
          <label for="emailInput" class="form-label">Your Email</label>
          <input type="email"
                 class="form-control"
                 id="emailInput"
                 name="email"
                 placeholder="name@example.com"
                 required>
        </div>

        <div class="mb-3">
          <label for="messageInput" class="form-label">Message</label>
          <textarea class="form-control"
                    id="messageInput"
                    name="message"
                    rows="4"
                    placeholder="Write your message here..."
                    required></textarea>
        </div>

        <input type="hidden" name="_subject" value="New Contact Form Message">
        <input type="hidden" name="_redirect" value="thankyou.html">

        <button type="submit" class="btn btn-success w-100">
          Send Message
        </button>
      </form>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
